<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cluedle - Wordle with Clues</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 0.9em;
        }

        .difficulty-select {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            justify-content: center;
        }

        .difficulty-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .difficulty-btn.active {
            background: #667eea;
            color: white;
        }

        .difficulty-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .game-area {
            display: none;
        }

        .game-area.active {
            display: block;
        }

        .guess-input {
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            border: 3px solid #667eea;
            border-radius: 10px;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 0.2em;
        }

        .guess-btn {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .guess-btn:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .guess-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: #f7f7f7;
            border-radius: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.8em;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .history {
            margin-top: 20px;
        }

        .guess-item {
            background: #f7f7f7;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .letter-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 10px;
        }

        .letter-box {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
            border-radius: 8px;
            color: white;
            text-transform: uppercase;
        }

        .letter-box.correct {
            background: #6aaa64;
        }

        .letter-box.present {
            background: #c9b458;
        }

        .letter-box.absent {
            background: #787c7e;
        }

        .guess-clue {
            color: #666;
            font-style: italic;
            line-height: 1.4;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #ddd;
        }

        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.win {
            background: #4ade80;
            color: white;
        }

        .message.lose {
            background: #f87171;
            color: white;
        }

        .message.info {
            background: #60a5fa;
            color: white;
        }

        .new-game-btn {
            width: 100%;
            padding: 15px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }

        .new-game-btn:hover {
            background: #653a8a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
            }

            .difficulty-btn {
                font-size: 0.9em;
                padding: 10px;
            }

            .letter-box {
                width: 45px;
                height: 45px;
                font-size: 1.3em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Cluedle</h1>
        <p class="subtitle">Wordle with helpful clues!</p>

        <div class="difficulty-select" id="difficultySelect">
            <button class="difficulty-btn" data-difficulty="easy">Easy</button>
            <button class="difficulty-btn active" data-difficulty="medium">Medium</button>
            <button class="difficulty-btn" data-difficulty="hard">Hard</button>
        </div>

        <div class="game-area" id="gameArea">
            <div class="message" id="message"></div>

            <div class="stats">
                <div class="stat">
                    <div class="stat-label">Attempts</div>
                    <div class="stat-value" id="attempts">0/6</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Difficulty</div>
                    <div class="stat-value" id="currentDifficulty">Medium</div>
                </div>
            </div>

            <input 
                type="text" 
                class="guess-input" 
                id="guessInput" 
                maxlength="5" 
                placeholder="Enter 5-letter word"
                autocomplete="off"
            >
            <button class="guess-btn" id="guessBtn">Submit Guess</button>

            <div class="history" id="history"></div>

            <button class="new-game-btn" id="newGameBtn">New Game</button>
        </div>
    </div>

                    'GRUFF': 'Rough or stern manner.',
                    'HYPER': 'Excessively energetic.',
                    'INEPT': 'Lacking skill or competence.',
                    'JUROR': 'Member of a jury.',
                    'KIOSK': 'Small booth or stand.',
                    'LUCID': 'Clear and easy to understand.',
                    'MAXIM': 'Short expression of principle.',
                    'NOMAD': 'Wandering person without home.',
                    'OPINE': 'Express an opinion.',
                    'PROXY': 'Authority to represent another.',
                    'QUELL': 'Put down or suppress.',
                    'RAWLY': 'In a crude or unrefined way.',
                    'STAID': 'Sedate and respectable.',
                    'TOXIC': 'Poisonous or harmful.',
                    'UNDUE': 'Excessive or unwarranted.',
                    'VAPID': 'Lacking interest or liveliness.'
                }
            }
        };

        let currentWord = '';
        let currentDifficulty = 'medium';
        let attempts = 0;
        let maxAttempts = 6;
        let gameActive = false;
        let guessHistory = [];

        const difficultyBtns = document.querySelectorAll('.difficulty-btn');
        const gameArea = document.getElementById('gameArea');
        const guessInput = document.getElementById('guessInput');
        const guessBtn = document.getElementById('guessBtn');
        const newGameBtn = document.getElementById('newGameBtn');
        const attemptsDisplay = document.getElementById('attempts');
        const difficultyDisplay = document.getElementById('currentDifficulty');
        const historyDiv = document.getElementById('history');
        const messageDiv = document.getElementById('message');

        difficultyBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                difficultyBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDifficulty = btn.dataset.difficulty;
                startGame();
            });
        });

        guessBtn.addEventListener('click', submitGuess);
        newGameBtn.addEventListener('click', startGame);
        
        guessInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitGuess();
            }
        });

        guessInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.toUpperCase().replace(/[^A-Z]/g, '');
        });

        function startGame() {
            const wordList = wordLists[currentDifficulty].words;
            currentWord = wordList[Math.floor(Math.random() * wordList.length)];
            attempts = 0;
            guessHistory = [];
            gameActive = true;
            
            gameArea.classList.add('active');
            guessInput.value = '';
            guessInput.disabled = false;
            guessBtn.disabled = false;
            historyDiv.innerHTML = '';
            messageDiv.className = 'message';
            
            attemptsDisplay.textContent = `${attempts}/${maxAttempts}`;
            difficultyDisplay.textContent = currentDifficulty.charAt(0).toUpperCase() + currentDifficulty.slice(1);
            
            guessInput.focus();
        }

        function submitGuess() {
            if (!gameActive) return;
            
            const guess = guessInput.value.toUpperCase().trim();
            
            if (guess.length !== 5) {
                showMessage('Please enter exactly 5 letters!', 'info');
                return;
            }
            
            if (guessHistory.some(g => g.word === guess)) {
                showMessage('You already tried that word!', 'info');
                return;
            }
            
            attempts++;
            attemptsDisplay.textContent = `${attempts}/${maxAttempts}`;
            
            const letterStates = getLetterStates(guess, currentWord);
            const clue = getClue(guess);
            
            guessHistory.push({ word: guess, letterStates: letterStates, clue: clue });
            addGuessToHistory(guess, letterStates, clue);
            
            if (guess === currentWord) {
                winGame();
            } else if (attempts >= maxAttempts) {
                loseGame();
            } else {
                guessInput.value = '';
                guessInput.focus();
            }
        }

        function getLetterStates(guess, target) {
            const states = [];
            const targetLetters = target.split('');
            const guessLetters = guess.split('');
            
            // First pass: mark correct positions
            for (let i = 0; i < 5; i++) {
                if (guessLetters[i] === targetLetters[i]) {
                    states[i] = 'correct';
                    targetLetters[i] = null;
                } else {
                    states[i] = null;
                }
            }
            
            // Second pass: mark present letters
            for (let i = 0; i < 5; i++) {
                if (states[i] === null) {
                    const index = targetLetters.indexOf(guessLetters[i]);
                    if (index !== -1) {
                        states[i] = 'present';
                        targetLetters[index] = null;
                    } else {
                        states[i] = 'absent';
                    }
                }
            }
            
            return states;
        }

        function getClue(guess) {
            const clues = wordLists[currentDifficulty].clues;
            const targetClue = clues[currentWord];
            
            // Generate contextual clue
            const genericClues = [
                'Keep trying! The answer is a common word.',
                'Not quite! Think about everyday things.',
                'Good guess, but try a different direction.',
                'Interesting! The word is more straightforward.',
                'Close! Consider simpler possibilities.',
                'Nice try! Think about basic concepts.',
                'Almost there! The actual word is more common.',
                'Try again! Consider different categories.'
            ];
            
            return genericClues[attempts % genericClues.length];
        }

        function addGuessToHistory(word, letterStates, clue) {
            const guessItem = document.createElement('div');
            guessItem.className = 'guess-item';
            
            const letterRow = document.createElement('div');
            letterRow.className = 'letter-row';
            
            for (let i = 0; i < 5; i++) {
                const letterBox = document.createElement('div');
                letterBox.className = `letter-box ${letterStates[i]}`;
                letterBox.textContent = word[i];
                letterRow.appendChild(letterBox);
            }
            
            const clueDiv = document.createElement('div');
            clueDiv.className = 'guess-clue';
            clueDiv.innerHTML = `💡 ${clue}`;
            
            guessItem.appendChild(letterRow);
            guessItem.appendChild(clueDiv);
            historyDiv.insertBefore(guessItem, historyDiv.firstChild);
        }

        function winGame() {
            gameActive = false;
            guessInput.disabled = true;
            guessBtn.disabled = true;
            showMessage(`🎉 Correct! You got it in ${attempts} ${attempts === 1 ? 'try' : 'tries'}!`, 'win');
        }

        function loseGame() {
            gameActive = false;
            guessInput.disabled = true;
            guessBtn.disabled = true;
            showMessage(`Game Over! The word was: ${currentWord}`, 'lose');
        }

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type} show`;
        }

        // Start with medium difficulty
        startGame();
    </script>
</body>
</html>
